<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skip Trans — Diesel Prices</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0b1118;
    --surface:   #131c26;
    --surface2:  #1a2536;
    --border:    rgba(255,255,255,0.07);
    --text:      #e8edf2;
    --muted:     #6b7f94;
    --accent:    #00e676;
    --accent-dk: #00b35a;
    --danger:    #ff4d4d;
    --warn:      #ffb300;
    --blue:      #2979ff;
    --fuel:      #f5a623;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(41,121,255,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 90% 80%, rgba(0,230,118,0.06) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    padding: 28px 20px 40px;
    max-width: 780px;
    margin: 0 auto;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 28px;
    gap: 16px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .fuel-icon {
    width: 42px;
    height: 42px;
    background: linear-gradient(135deg, var(--fuel), #e67e00);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 4px 16px rgba(245,166,35,0.3);
  }

  .brand-text h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text);
    line-height: 1.1;
  }

  .brand-text p {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
    font-weight: 400;
  }

  /* ── Refresh ring ── */
  .refresh-ring-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex-shrink: 0;
  }

  .ring-container {
    position: relative;
    width: 48px;
    height: 48px;
    cursor: pointer;
  }

  .ring-container:hover svg circle.track-progress {
    opacity: 0.9;
  }

  .ring-container svg {
    transform: rotate(-90deg);
    width: 48px;
    height: 48px;
  }

  .ring-container svg circle {
    fill: none;
    stroke-width: 3;
    cx: 24;
    cy: 24;
    r: 20;
  }

  circle.track-bg    { stroke: var(--surface2); }
  circle.track-progress {
    stroke: var(--blue);
    stroke-linecap: round;
    stroke-dasharray: 125.6;
    stroke-dashoffset: 0;
    transition: stroke-dashoffset 1s linear;
  }

  .ring-inner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
  }

  .refresh-label {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.3px;
  }

  /* ── Mock banner ── */
  .mock-banner {
    background: rgba(255,179,0,0.1);
    border: 1px solid rgba(255,179,0,0.25);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 20px;
    font-size: 12px;
    color: var(--warn);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mock-banner.hidden { display: none; }

  /* ── Summary row ── */
  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.4s ease both;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-card.cheapest::after { background: var(--accent); }
  .stat-card.expensive::after { background: var(--danger); }
  .stat-card.average::after { background: var(--blue); }

  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }

  .stat-value {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1;
  }
  .stat-card.cheapest .stat-value { color: var(--accent); }
  .stat-card.expensive .stat-value { color: var(--danger); }
  .stat-card.average .stat-value { color: var(--blue); }

  .stat-unit {
    font-size: 12px;
    font-weight: 400;
    opacity: 0.7;
    margin-left: 2px;
  }

  .stat-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Station cards ── */
  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 10px;
    margin-top: 4px;
  }

  .station-group {
    margin-bottom: 18px;
  }

  .stations {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .station-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: fadeUp 0.4s ease both;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .station-row:hover {
    border-color: rgba(255,255,255,0.15);
    background: var(--surface2);
  }

  .station-row.cheapest {
    border-color: rgba(0,230,118,0.2);
  }
  .station-row.cheapest::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    border-radius: 10px 0 0 10px;
  }

  .station-row.priciest {
    border-color: rgba(255,77,77,0.2);
  }
  .station-row.priciest::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--danger);
    border-radius: 10px 0 0 10px;
  }

  .rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    width: 20px;
    text-align: center;
    flex-shrink: 0;
  }

  .station-info {
    flex: 1;
    min-width: 0;
  }

  .station-name {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .station-brand {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* price bar */
  .bar-wrap {
    flex: 1;
    height: 4px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    overflow: hidden;
    max-width: 100px;
  }
  .bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .station-price {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 0.5px;
    flex-shrink: 0;
    min-width: 72px;
    text-align: right;
  }

  .price-unit {
    font-size: 11px;
    font-weight: 400;
    opacity: 0.6;
  }

  .badge {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 3px 7px;
    border-radius: 20px;
    flex-shrink: 0;
  }
  .badge-best    { background: rgba(0,230,118,0.15); color: var(--accent); }
  .badge-worst   { background: rgba(255,77,77,0.15);  color: var(--danger); }

  /* ── Footer ── */
  footer {
    margin-top: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
  }

  .last-updated {
    font-size: 11px;
    color: var(--muted);
  }

  .last-updated span {
    color: var(--text);
    font-weight: 500;
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: 'Barlow', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .refresh-btn.spinning .icon { animation: spin 0.6s linear; }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* stagger cards */
  .station-row:nth-child(1) { animation-delay: 0.05s; }
  .station-row:nth-child(2) { animation-delay: 0.10s; }
  .station-row:nth-child(3) { animation-delay: 0.15s; }
  .station-row:nth-child(4) { animation-delay: 0.20s; }
  .station-row:nth-child(5) { animation-delay: 0.25s; }
  .station-row:nth-child(6) { animation-delay: 0.30s; }
  .station-row:nth-child(7) { animation-delay: 0.35s; }

  .stat-card:nth-child(1) { animation-delay: 0s; }
  .stat-card:nth-child(2) { animation-delay: 0.08s; }
  .stat-card:nth-child(3) { animation-delay: 0.16s; }

  /* ── Loading state ── */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    color: var(--muted);
    font-size: 14px;
    gap: 10px;
  }

  .spinner {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @media (max-width: 500px) {
    .summary { grid-template-columns: 1fr 1fr; }
    .stat-card.average { grid-column: span 2; }
    .bar-wrap { display: none; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="brand">
      <div class="fuel-icon">⛽</div>
      <div class="brand-text">
        <h1>SKIP TRANS</h1>
        <p>Daily Diesel Prices — Brisbane</p>
      </div>
    </div>

    <div style="display:flex; align-items:center; gap:12px;">
     
    <div class="refresh-ring-wrap">
      <div class="ring-container" onclick="manualRefresh()" title="Click to refresh now">
        <svg viewBox="0 0 48 48">
          <circle class="track-bg" />
          <circle class="track-progress" id="progressRing" />
        </svg>
        <div class="ring-inner" id="ringCountdown">—</div>
      </div>
      <div class="refresh-label">next<br>refresh</div>
    </div>
    </div>
  </header>

  <div id="mockBanner" class="mock-banner hidden">
    ⚠️ <strong>TEST MODE</strong> — Showing simulated prices. Live data will appear once the API key is configured.
  </div>

  <div id="content">
    <div class="loading"><div class="spinner"></div> Loading prices…</div>
  </div>

  <footer>
    <div class="last-updated">
      Last updated: <span id="lastUpdated">—</span>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="manualRefresh()">
      <span class="icon">↻</span> Refresh now
    </button>
  </footer>

</div>

<script>
  const REFRESH_INTERVAL_MS = 15 * 60 * 1000; // 15 minutes
  const CIRCUMFERENCE = 2 * Math.PI * 20;     // r=20

  let refreshTimer;
  let countdownInterval;
  let nextRefreshAt;

  // ── Fetch prices.json from the same directory ──
  async function fetchPrices() {
    // Cache-bust so the browser doesn't serve a stale file
    const url = `prices.json?t=${Date.now()}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return resp.json();
  }

  // ── Render the dashboard ──
  function render(data) {
    const stations = [...data.stations].sort((a, b) => (a.price ?? 999) - (b.price ?? 999));
    const prices   = stations.map(s => s.price).filter(Boolean);
    const minP     = Math.min(...prices);
    const maxP     = Math.max(...prices);
    const avgP     = prices.length ? (prices.reduce((a,b) => a+b, 0) / prices.length) : null;

    const cheapestStation  = stations.find(s => s.price === minP);
    const expensiveStation = stations.find(s => s.price === maxP);

    // Mock banner
    document.getElementById('mockBanner').classList.toggle('hidden', !data.is_mock);

    // Group by brand
    const pacific = stations.filter(s => s.name.startsWith('Pacific'));
    const united  = stations.filter(s => s.name.startsWith('United'));

    function stationHTML(s, rank) {
      const isCheapest = s.price === minP;
      const isPriciest = s.price === maxP;
      const barPct     = prices.length > 1
        ? Math.round(((s.price - minP) / (maxP - minP)) * 100)
        : 50;
      const barColor   = isCheapest ? 'var(--accent)' : isPriciest ? 'var(--danger)' : 'var(--blue)';
      const priceColor = isCheapest ? 'var(--accent)' : isPriciest ? 'var(--danger)' : 'var(--text)';
      const badge      = isCheapest
        ? '<span class="badge badge-best">Cheapest</span>'
        : isPriciest
        ? '<span class="badge badge-worst">Highest</span>'
        : '';
      const cls = isCheapest ? ' cheapest' : isPriciest ? ' priciest' : '';
      const shortName = s.name.replace('Pacific Fuel ', '').replace('United ', '');

      return `
      <div class="station-row${cls}">
        <div class="rank">${rank}</div>
        <div class="station-info">
          <div class="station-name">${s.name}</div>
          <div class="station-brand">${s.name.startsWith('Pacific') ? 'Pacific Fuel' : 'United Petroleum'}</div>
        </div>
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${barPct}%; background:${barColor}"></div>
        </div>
        ${badge}
        <div class="station-price" style="color:${priceColor}">
          ${s.price != null ? s.price.toFixed(1) : '—'}<span class="price-unit">c/L</span>
        </div>
      </div>`;
    }

    let rank = 1;

    const html = `
      <div class="summary">
        <div class="stat-card cheapest">
          <div class="stat-label">Cheapest today</div>
          <div class="stat-value">${minP.toFixed(1)}<span class="stat-unit">c/L</span></div>
          <div class="stat-sub">${cheapestStation?.name ?? '—'}</div>
        </div>
        <div class="stat-card expensive">
          <div class="stat-label">Most expensive</div>
          <div class="stat-value">${maxP.toFixed(1)}<span class="stat-unit">c/L</span></div>
          <div class="stat-sub">${expensiveStation?.name ?? '—'}</div>
        </div>
        <div class="stat-card average">
          <div class="stat-label">Average across all</div>
          <div class="stat-value">${avgP ? avgP.toFixed(1) : '—'}<span class="stat-unit">c/L</span></div>
          <div class="stat-sub">${stations.length} stations monitored</div>
        </div>
      </div>

      <div class="station-group">
        <div class="section-label">Pacific Fuel</div>
        <div class="stations">
          ${pacific.map(s => stationHTML(s, rank++)).join('')}
        </div>
      </div>

      <div class="station-group">
        <div class="section-label">United Petroleum</div>
        <div class="stations">
          ${united.map(s => stationHTML(s, rank++)).join('')}
        </div>
      </div>`;

    document.getElementById('content').innerHTML = html;
    document.getElementById('lastUpdated').textContent = data.last_updated_str ?? '—';
  }

  // ── Load data and re-render ──
  async function loadData() {
    try {
      const data = await fetchPrices();
      render(data);
    } catch (err) {
      console.error('Failed to load prices:', err);
      document.getElementById('content').innerHTML = `
        <div class="loading" style="color:var(--danger)">
          ⚠ Could not load prices.json — check the file is in the repo.
        </div>`;
    }
  }

  // ── Refresh countdown ring ──
  function startCountdown() {
    clearInterval(countdownInterval);
    nextRefreshAt = Date.now() + REFRESH_INTERVAL_MS;

    countdownInterval = setInterval(() => {
      const remaining = Math.max(0, nextRefreshAt - Date.now());
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);

      // Update ring
      const progress = remaining / REFRESH_INTERVAL_MS;
      const offset   = CIRCUMFERENCE * (1 - progress);
      document.getElementById('progressRing').style.strokeDashoffset = offset;
      document.getElementById('ringCountdown').textContent =
        remaining > 60000 ? `${mins}m` : `${secs}s`;

      if (remaining <= 0) {
        loadData();
        startCountdown();
      }
    }, 1000);
  }

  // ── Manual refresh button ──
  function manualRefresh() {
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('spinning');
    setTimeout(() => btn.classList.remove('spinning'), 600);
    loadData();
    startCountdown();
  }

  // ── Init ──
  loadData();
  startCountdown();
</script>
</body>
</html>
